  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0b1020;
      overflow: hidden;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", "PingFang TC", sans-serif;
    }

    /* Canvas 全畫面（用 svh/dvh 防 iOS Safari 黑邊/跳動） */
    #game{
      display:block;
      width:100vw;
      height:100svh;      /* 新 Safari */
      height:100dvh;      /* 新規格 */
      background:#0b1020;
      touch-action:none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===============================
       手機虛擬控制器（圓形）
       =============================== */

    #touchUI{
      position:fixed;
      left:0;
      right:0;
      bottom: calc(14px + env(safe-area-inset-bottom));
      height: 170px;
      pointer-events:none;
      z-index:10;
      display:none; /* JS 判斷手機先顯示 */
    }

    /* 左邊：圓形方向盤 */
    #movePad{
      position:absolute;
      left: 18px;
      bottom: 0;
      width: 124px;
      height: 124px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events:auto;
      touch-action:none;
      backdrop-filter: blur(6px);
    }
    #movePad::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width: 38px;
      height: 38px;
      margin-left:-19px;
      margin-top:-19px;
      border-radius:50%;
      background: rgba(255,255,255,0.22);
    }

    /* 右邊：跳躍掣（隔遠啲唔撞手） */
    #btnJump{
      position:absolute;
      right: 24px;
      bottom: 10px;
      width: 98px;
      height: 98px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.16);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      pointer-events:auto;
      touch-action:none;
      backdrop-filter: blur(6px);
    }
    #btnJump:active{ background: rgba(255,255,255,0.28); }
  </style>
</head>

    const PALETTE = {
      " ": null,
      "0": "#0b1020",
      "S": "#f4f0e3",
      "K": "#1b1f2e",
      "G": "#4b566e",
      "B": "#7a3b2e",

      "O": "#ffb703"
    };

    function drawSprite(ctx, sprite, x, y, scale = 3, flip = false) {
      for (let j = 0; j < sprite.length; j++) {
        const row = sprite[j];
        for (let i = 0; i < row.length; i++) {
          const ch = row[i];
          const col = PALETTE[ch];
          if (!col) continue;
          const px = flip ? row.length - 1 - i : i;
          ctx.fillStyle = col;
          ctx.fillRect((x + px * scale) | 0, (y + j * scale) | 0, scale, scale);
        }
      }
    }

    const SPRITES = {
      playerIdle: [

        "   LL     ",
        "  DDDDD   ",
        "  DDDDD   ",

    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const lerp = (a, b, t) => a + (b - a) * t;

    class AABB {
      constructor(x, y, w, h) { this.x = x; this.y = y; this.w = w; this.h = h; }
      intersects(o) {
        return (
          this.x < o.x + o.w &&
          this.x + this.w > o.x &&
          this.y < o.y + o.h &&
          this.y + this.h > o.y
        );
      }
    }

    class Platform {
      constructor(x, y, w, h, type = "ground") { this.x = x; this.y = y; this.w = w; this.h = h; this.type = type; }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      draw(ctx, camX, scale) {
        const sx = (this.x - camX) | 0;
        const sy = this.y | 0;

        if (this.type === "ground") {
          const tileW = SPRITES.brick[0].length * scale;
          const tileH = SPRITES.brick.length * scale;
          for (let yy = sy; yy < sy + this.h; yy += tileH) {
            for (let xx = sx; xx < sx + this.w; xx += tileW) drawSprite(ctx, SPRITES.brick, xx, yy, scale);
          }
        } else {
          const sprW = SPRITES.beam[0].length * scale;
          for (let xx = sx; xx < sx + this.w; xx += sprW) drawSprite(ctx, SPRITES.beam, xx, sy, scale);
          ctx.fillStyle = "rgba(0,0,0,0.18)";
          ctx.fillRect(sx, sy + SPRITES.beam.length * scale, this.w, 3);
        }
      }
    }

    class Item {
      constructor(x, y) { this.x = x; this.y = y; this.w = 18; this.h = 14; this.collected = false; this.bob = 0; }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt) { this.bob += dt * 6; }
      draw(ctx, camX, scale) {
        if (this.collected) return;
        const bobY = Math.sin(this.bob) * 3;
        drawSprite(ctx, SPRITES.doc, (this.x - camX) | 0, (this.y + bobY) | 0, scale);
      }
    }

    class StarTrigger {
      constructor(x, y, qIndex) { this.x = x; this.y = y; this.w = 22; this.h = 22; this.used = false; this.qIndex = qIndex; this.bob = 0; }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt) { this.bob += dt * 6; }
      draw(ctx, camX, scale) {
        if (this.used) return;
        const bobY = Math.sin(this.bob) * 3;
        drawSprite(ctx, SPRITES.star, (this.x - camX) | 0, (this.y + bobY) | 0, scale);
      }
    }

    class Bullet {
      constructor(x, y, vx, vy = 0) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.w = 10; this.h = 10;
        this.dead = false;
        this.life = 2.6;
      }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt, game) {
        if (this.dead) return;
        this.life -= dt;
        if (this.life <= 0) { this.dead = true; return; }
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        const a = this.aabb;
        for (const p of game.platforms) if (a.intersects(p.aabb)) { this.dead = true; return; }

        if (this.x < -200 || this.x > game.levelWidth + 200 || this.y < -200 || this.y > game.H + 300) this.dead = true;
      }
      draw(ctx, camX, scale) {
        if (this.dead) return;
        drawSprite(ctx, SPRITES.bullet, (this.x - camX) | 0, this.y | 0, Math.max(2, scale - 1));
      }
    }

    class Enemy {
      constructor(x, y, patrolMin, patrolMax) {
        this.x = x; this.y = y;
        this.w = 22; this.h = 30;
        this.vx = 35; this.vy = 0;
        this.patrolMin = patrolMin; this.patrolMax = patrolMax;
        this.alive = true;
        this.anim = 0;
        this.face = 1;
        this.standOnBeams = true;
      }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt, game) {
        if (!this.alive) return;
        this.anim += dt * 8;

        this.x += this.vx * dt;
        this.face = this.vx >= 0 ? 1 : -1;
        if (this.x < this.patrolMin) { this.x = this.patrolMin; this.vx = Math.abs(this.vx); }
        if (this.x + this.w > this.patrolMax) { this.x = this.patrolMax - this.w; this.vx = -Math.abs(this.vx); }

        this.vy += game.physics.gravity * dt;
        this.y += this.vy * dt;

        for (const p of game.platforms) {
          if (!this.standOnBeams && p.type === "beam") continue;
          const a = this.aabb, b = p.aabb;
          if (!a.intersects(b)) continue;
          const wasAbove = (a.y + a.h) - b.y < 14 && this.vy >= 0;
          if (wasAbove) { this.y = b.y - this.h; this.vy = 0; }
        }
      }
      draw(ctx, camX, scale) {
        if (!this.alive) return;
        const frame = (Math.floor(this.anim) % 2 === 0) ? SPRITES.enemy1 : SPRITES.enemy2;
        drawSprite(ctx, frame, (this.x - camX) | 0, this.y | 0, scale, this.face < 0);
      }
    }

    class ShooterEnemy extends Enemy {
      constructor(x, y, patrolMin, patrolMax, opts = {}) {
        super(x, y, patrolMin, patrolMax);
        this.patrol = !!opts.patrol;
        this.vx = this.patrol ? (opts.vx ?? 22) : 0;
        this.cooldown = 0.9 + Math.random() * 0.6;
        this.minCD = 1.15;
        this.maxCD = 2.05;
        this.range = opts.range ?? 480;
        this.bulletSpeed = opts.bulletSpeed ?? 380;
      }
      update(dt, game) {
        if (!this.alive) return;

        if (this.patrol) super.update(dt, game);
        else {
          this.anim += dt * 6;
          this.vy += game.physics.gravity * dt;
          this.y += this.vy * dt;
          for (const p of game.platforms) {
            const a = this.aabb, b = p.aabb;
            if (!a.intersects(b)) continue;
            const wasAbove = (a.y + a.h) - b.y < 14 && this.vy >= 0;
            if (wasAbove) { this.y = b.y - this.h; this.vy = 0; }
          }
        }

        const px = game.player.x + game.player.w * 0.5;
        const ex = this.x + this.w * 0.5;
        const dx = px - ex;
        this.face = dx >= 0 ? 1 : -1;

        const onScreen = (this.x - game.cameraX) > -220 && (this.x - game.cameraX) < game.W + 220;
        const near = Math.abs(dx) <= this.range && Math.abs((game.player.y - this.y)) < 180;

        this.cooldown -= dt;
        if (onScreen && near && this.cooldown <= 0) {
          this.cooldown = this.minCD + Math.random() * (this.maxCD - this.minCD);
          const bx = this.face > 0 ? (this.x + this.w + 2) : (this.x - 12);
          const by = this.y + 14;

          // 0° / -30° / -45°（斜射）
          const angles = [0, -30, -45];
          const deg = angles[(Math.random() * angles.length) | 0];
          const rad = deg * Math.PI / 180;
          const spd = this.bulletSpeed;
          const vx = Math.cos(rad) * spd * this.face;
          const vy = Math.sin(rad) * spd;

          game.bullets.push(new Bullet(bx, by, vx, vy));
        }
      }
      draw(ctx, camX, scale) {
        if (!this.alive) return;
        const frame = (Math.floor(this.anim) % 2 === 0) ? SPRITES.shooter1 : SPRITES.shooter2;
        drawSprite(ctx, frame, (this.x - camX) | 0, this.y | 0, scale, this.face < 0);
      }
    }

    class Player {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.w = 22; this.h = 30;
        this.vx = 0; this.vy = 0;
        this.onGround = false;
        this.face = 1;
        this.anim = 0;
        this.invuln = 0;
        this.coyote = 0;
        this.jumpBuf = 0;
        this.jumpHold = 0;
        this.jumping = false;
        this.coyoteMax = 0.10;
        this.jumpBufMax = 0.12;
        this.jumpHoldMax = 0.18;
        this.jumpCut = 0.55;
      }
      get aabb() { return new AABB(this.x, this.y, this.w, this.h); }
      update(dt, game) {
        const input = game.input;
        const inverted = game.effects.invertTimer > 0;
        const LEFT = inverted ? input.right : input.left;
        const RIGHT = inverted ? input.left : input.right;

        this.invuln = Math.max(0, this.invuln - dt);
        this.coyote = Math.max(0, this.coyote - dt);
        this.jumpBuf = Math.max(0, this.jumpBuf - dt);
        if (input.jumpPressed) this.jumpBuf = this.jumpBufMax;

        const accel = game.physics.accel;
        if (LEFT)  { this.vx -= accel * dt; this.face = -1; }
        if (RIGHT) { this.vx += accel * dt; this.face =  1; }
        if (!LEFT && !RIGHT) {
          const f = this.onGround ? game.physics.frictionGround : game.physics.frictionAir;
          this.vx *= Math.pow(f, dt * 60);
        }
        this.vx = clamp(this.vx, -game.physics.maxSpeed, game.physics.maxSpeed);

        const prevX = this.x;
        const prevY = this.y;

        const canJump = this.onGround || this.coyote > 0;
        if (this.jumpBuf > 0 && canJump) {
          this.vy = -game.physics.jumpVel;
          this.onGround = false;
          this.coyote = 0;
          this.jumpBuf = 0;
          this.jumping = true;
          this.jumpHold = 0;
        }

        this.vy += game.physics.gravity * dt;
        if (this.jumping && input.jump && this.vy < 0 && this.jumpHold < this.jumpHoldMax) {
          this.vy -= game.physics.gravity * dt * 0.55;
          this.jumpHold += dt;
        }
        if (this.jumping && !input.jump && this.vy < 0) {
          this.vy *= this.jumpCut;
          this.jumping = false;
        }

        this.x += this.vx * dt;
        this.resolveCollisionsX(game, prevX);
        this.y += this.vy * dt;
        this.onGround = false;
        this.resolveCollisionsY(game, prevY);
        if (this.onGround) { this.coyote = this.coyoteMax; this.jumping = false; }

        const moving = Math.abs(this.vx) > 20;
        this.anim += dt * (moving ? 10 : 4);

        if (this.y > game.H + 240) game.playerDie("你跌落坑洞，任務中斷。");
      }
      resolveCollisionsX(game, prevX) {
        for (const p of game.platforms) {
          if (p.type === "beam") continue;
          const a = this.aabb, b = p.aabb;
          if (!a.intersects(b)) continue;
          if (prevX + this.w <= b.x) this.x = b.x - this.w;
          else if (prevX >= b.x + b.w) this.x = b.x + b.w;
          this.vx = 0;
        }
        this.x = clamp(this.x, 0, game.levelWidth - this.w);
      }
      resolveCollisionsY(game, prevY) {
        for (const p of game.platforms) {
          const a = this.aabb, b = p.aabb;
          if (!a.intersects(b)) continue;
          const wasAbove = (prevY + this.h) <= b.y + 4;
          const wasBelow = prevY >= (b.y + b.h - 4);
          if (this.vy >= 0 && wasAbove) {
            this.y = b.y - this.h; this.vy = 0; this.onGround = true;
          } else if (this.vy < 0 && wasBelow) {
            this.y = b.y + b.h; this.vy = 0;
          } else {
            const overlapTop = (a.y + a.h) - b.y;
            const overlapBottom = (b.y + b.h) - a.y;
            if (overlapTop < overlapBottom) { this.y -= overlapTop; this.vy = 0; this.onGround = true; }
            else { this.y += overlapBottom; this.vy = 0; }
          }
        }
      }
      hurt(game, fromDir) {
        if (this.invuln > 0) return;
        game.lives -= 1;
        this.invuln = 1.0;
        this.vy = -220;
        this.vx = (fromDir || -this.face) * 220;
        if (game.lives <= 0) game.setState("gameover", "你失去所有生命，任務失敗。");
      }
      draw(ctx, camX, scale, invertBlink) {
        const moving = Math.abs(this.vx) > 20;
        const sprite = moving
          ? ((Math.floor(this.anim) % 2 === 0) ? SPRITES.playerWalk1 : SPRITES.playerWalk2)
          : SPRITES.playerIdle;

        const invFlicker = (this.invuln > 0 && Math.floor(this.invuln * 12) % 2 === 0);
        const invertFlicker = invertBlink && (Math.floor(performance.now() / 1000 * 12) % 2 === 0);
        if (invFlicker || invertFlicker) ctx.globalAlpha = 0.35;

        drawSprite(ctx, sprite, (this.x - camX) | 0, this.y | 0, scale, this.face < 0);
        ctx.globalAlpha = 1;
      }
    }

    class Game {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d", { alpha: false });
        this.ctx.imageSmoothingEnabled = false;

        this.W = 960; this.H = 540;
        this.state = "intro";
        this.score = 0; this.lives = 3;
        this.timeLimit = 150; this.timeLeft = this.timeLimit;

        this.scale = 3;
        this.levelWidth = 3000;
        this.cameraX = 0; this.cameraSmooth = 0.12;

        this.physics = {
          gravity: 1100, accel: 2200, maxSpeed: 220, jumpVel: 420,
          frictionGround: 0.78, frictionAir: 0.92
        };

        this.effects = { invertTimer: 0 };
        this.input = { left: false, right: false, jump: false, jumpPressed: false };

        this.platforms = [];
        this.items = [];
        this.enemies = [];
        this.stars = [];
        this.bullets = [];

        this.player = new Player(70, 340);
        this.goal = { x: this.levelWidth - 140, y: 0, w: 36, h: 60 };
        this.goalAABB = () => new AABB(this.goal.x, this.goal.y, this.goal.w, this.goal.h);

        this.quiz = { title: "", source: null, idx: 0, selected: -1, feedback: "", optionRects: [], lock: 0, onCorrect: null, onWrong: null };

        this.bgBuildings = this.generateBuildings(84);
        this.bgClouds = this.generateClouds(10);

        this.fixedDt = 1 / 120;
        this.accum = 0;
        this.last = performance.now() / 1000;

        this.buildLevel();
        this.bindKeyboard();
        this.bindPointerStart();
        this.bindQuizPointer();
        this.setupTouchControls();
        this.setupResize();

        requestAnimationFrame(() => this.loop());
      }

      setupResize() {
        const apply = () => {
          const dpr = Math.min(2, window.devicePixelRatio || 1);
          this.canvas.width  = Math.floor(this.W * dpr);
          this.canvas.height = Math.floor(this.H * dpr);
          this.ctx.setTransform(1, 0, 0, 1, 0, 0);
          this.ctx.scale(dpr, dpr);
          this.ctx.imageSmoothingEnabled = false;
          this.canvas.style.width = "100vw";
          this.canvas.style.height = "100dvh";
        };
        apply();
        window.addEventListener("resize", apply, { passive: true });
        window.addEventListener("orientationchange", () => setTimeout(apply, 80), { passive: true });
        document.addEventListener("visibilitychange", () => { if (!document.hidden) apply(); }, { passive: true });
      }

      setupTouchControls() {
        const isMobile =
          matchMedia("(pointer: coarse)").matches ||
          /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        const touchUI = document.getElementById("touchUI");
        if (!touchUI) return;
        touchUI.style.display = isMobile ? "block" : "none";
        if (!isMobile) return;

        const pad = document.getElementById("movePad");
        const btnJump = document.getElementById("btnJump");

        let padActive = false;
        let centerX = 0;

        const updateCenter = () => {
          if (!pad) return;
          const r = pad.getBoundingClientRect();
          centerX = r.left + r.width / 2;
        };

        if (pad) {
          updateCenter();
          window.addEventListener("resize", updateCenter, { passive: true });
          window.addEventListener("orientationchange", () => setTimeout(updateCenter, 80), { passive: true });

          pad.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            if (this.state !== "playing") return;
            padActive = true;
            pad.setPointerCapture(e.pointerId);
          }, { passive: false });

          pad.addEventListener("pointermove", (e) => {
            if (!padActive || this.state !== "playing") return;
            const dx = e.clientX - centerX;
            const dead = 12;

            if (dx < -dead) { this.input.left = true;  this.input.right = false; }
            else if (dx > dead) { this.input.right = true; this.input.left = false; }
            else { this.input.left = false; this.input.right = false; }
          });

          const release = (e) => {
            padActive = false;
            this.input.left = false;
            this.input.right = false;
            try { pad.releasePointerCapture(e.pointerId); } catch {}
          };

          pad.addEventListener("pointerup", release);
          pad.addEventListener("pointercancel", release);
          pad.addEventListener("pointerleave", release);
        }

        if (btnJump) {
          btnJump.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            if (this.state !== "playing") return;
            if (!this.input.jump) this.input.jumpPressed = true;
            this.input.jump = true;
          }, { passive: false });

          const up = (e) => { e.preventDefault(); this.input.jump = false; };
          btnJump.addEventListener("pointerup", up, { passive: false });
          btnJump.addEventListener("pointercancel", up, { passive: false });
        }
      }

      clearInput() { this.input.left = this.input.right = this.input.jump = this.input.jumpPressed = false; }

      setState(s, reason = "") {
        this.state = s;
        if (s === "gameover") this.gameOverReason = reason || "任務失敗。";
      }

      resetAll() {
        this.state = "intro";
        this.score = 0; this.lives = 3; this.timeLeft = this.timeLimit;
        this.effects.invertTimer = 0;
        this.cameraX = 0;
        this.player = new Player(70, 340);
        this.bullets.length = 0;
        this.clearInput();
        this.buildLevel();
      }

      playerDie(reason) {
        if (this.state !== "playing") return;
        this.lives -= 1;
        if (this.lives <= 0) { this.setState("gameover", reason || "任務失敗。"); return; }
        this.player.x = 70; this.player.y = 340;
        this.player.vx = 0; this.player.vy = 0;
        this.player.invuln = 1.2;
        this.cameraX = 0;
        this.bullets.length = 0;
        this.clearInput();
      }

      buildLevel() {
        this.platforms.length = 0;
        this.items.length = 0;
        this.enemies.length = 0;
        this.stars.length = 0;
        this.bullets.length = 0;

        const groundY = 430;
        this.platforms.push(new Platform(0, groundY, 520, 120, "ground"));
        this.platforms.push(new Platform(560, groundY, 380, 120, "ground"));
        this.platforms.push(new Platform(980, groundY, 360, 120, "ground"));
        this.platforms.push(new Platform(1380, groundY, 320, 120, "ground"));
        this.platforms.push(new Platform(1740, groundY, 280, 120, "ground"));
        this.platforms.push(new Platform(2060, groundY, 320, 120, "ground"));
        this.platforms.push(new Platform(2420, groundY, 220, 120, "ground"));
        this.platforms.push(new Platform(2700, groundY, 200, 120, "ground"));
        this.platforms.push(new Platform(2920, groundY, 320, 120, "ground"));

        this.platforms.push(new Platform(640, 350, 180, 18, "beam"));
        this.platforms.push(new Platform(840, 300, 180, 18, "beam"));
        this.platforms.push(new Platform(820, 250, 140, 18, "beam"));
        this.platforms.push(new Platform(1060, 330, 220, 18, "beam"));
        this.platforms.push(new Platform(1240, 280, 160, 18, "beam"));
        this.platforms.push(new Platform(1460, 360, 160, 18, "beam"));
        this.platforms.push(new Platform(1640, 320, 160, 18, "beam"));
        this.platforms.push(new Platform(1680, 240, 140, 18, "beam"));
        this.platforms.push(new Platform(1820, 280, 160, 18, "beam"));
        this.platforms.push(new Platform(2000, 320, 160, 18, "beam"));
        this.platforms.push(new Platform(2140, 270, 160, 18, "beam"));
        this.platforms.push(new Platform(2860, 360, 160, 18, "beam"));
        this.platforms.push(new Platform(3040, 320, 160, 18, "beam"));

        this.goal.y = groundY - 60;
        this.goal.x = this.levelWidth - 140;

        const addDoc = (x, y) => this.items.push(new Item(x, y));
        addDoc(300, groundY - 70);
        addDoc(720, 320);
        addDoc(910, 270);
        addDoc(1160, 300);
        addDoc(1520, 330);
        addDoc(1760, groundY - 70);
        addDoc(1880, 250);
        addDoc(2140, groundY - 70);
        addDoc(2480, groundY - 70);
        addDoc(2885, 330);
        addDoc(2940, groundY - 70);

        this.stars.push(new StarTrigger(1080, 260, 0));
        this.stars.push(new StarTrigger(1880, 210, 1));

        const addEnemy = (x, y, min, max) => this.enemies.push(new Enemy(x, y, min, max));
        const addShooter = (x, y, min, max, opts) => this.enemies.push(new ShooterEnemy(x, y, min, max, opts));

        addEnemy(650,  groundY - 30, 560,  940);
        addEnemy(1120, groundY - 30, 980,  1340);
        addEnemy(1600, groundY - 30, 1380, 1700);
        addEnemy(2520, groundY - 30, 2420, 2640);
        addEnemy(2820, groundY - 30, 2700, 2920);

        addEnemy(860,  270, 840,  1010);
        addEnemy(1860, 250, 1820, 1980);

        addShooter(1280, groundY - 30, 1240, 1340, { patrol: false, range: 460, bulletSpeed: 380 });
        addShooter(2065, 240,          2000, 2160, { patrol: true,  vx: 22, range: 520, bulletSpeed: 360 });
        addShooter(2925, groundY - 30, 2920, 3240, { patrol: false, range: 520, bulletSpeed: 420 });
        addShooter(1560, 210, 1500, 1700, { patrol: false, range: 520, bulletSpeed: 360 });
        addShooter(2320, 190, 2260, 2460, { patrol: false, range: 520, bulletSpeed: 380 });
      }

      generateBuildings(n) {
        const arr = [];
        let x = 0;
        for (let i = 0; i < n; i++) {
          const w = 40 + Math.floor(Math.random() * 70);
          const h = 60 + Math.floor(Math.random() * 160);
          const style = Math.random();
          const roof = style < 0.55 ? "gable" : (style < 0.8 ? "flat" : "saw");
          const windows = 2 + Math.floor(Math.random() * 4);
          const chimney = Math.random() < 0.35;
          arr.push({ x, w, h, roof, windows, chimney, tone: Math.random() });
          x += w + (10 + Math.floor(Math.random() * 20));
        }
        return arr;
      }

      generateClouds(n) {
        const arr = [];
        for (let i = 0; i < n; i++) {
          arr.push({ x: Math.random() * this.levelWidth, y: 40 + Math.random() * 120, s: 2 + Math.floor(Math.random() * 2), spd: 4 + Math.random() * 8 });
        }
        return arr;
      }

      beginQuiz({ title, source, idx, onCorrect, onWrong }) {
        this.state = "quiz";
        this.quiz.title = title;
        this.quiz.source = source;
        this.quiz.idx = idx;
        this.quiz.selected = -1;
        this.quiz.feedback = "";
        this.quiz.optionRects = [];
        this.quiz.lock = 0;
        this.quiz.onCorrect = onCorrect;
        this.quiz.onWrong = onWrong;
        this.player.vx = 0; this.player.vy = 0;
        this.clearInput();
      }

      answerQuiz(choice) {
        if (this.quiz.lock > 0) return;
        this.quiz.selected = choice;
        const item = this.quiz.source[this.quiz.idx];
        const correct = choice === item.answer;
        this.quiz.lock = 0.9;
        this.quiz.feedback = correct ? `✅ 答啱！${item.explain}` : `❌ 答錯！${item.explain}`;
        if (correct && typeof this.quiz.onCorrect === "function") this.quiz.onCorrect();
        if (!correct && typeof this.quiz.onWrong === "function") this.quiz.onWrong();
      }

      bindQuizPointer() {
        this.canvas.addEventListener("pointerdown", (e) => {
          if (this.state !== "quiz") return;
          const r = this.canvas.getBoundingClientRect();
          const mx = (e.clientX - r.left) * (this.W / r.width);
          const my = (e.clientY - r.top) * (this.H / r.height);
          for (const b of this.quiz.optionRects) {
            if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
              this.answerQuiz(b.idx); break;
            }
          }
        }, { passive: true });
      }

      bindKeyboard() {
        window.addEventListener("keydown", (e) => {
          const blocks = ["ArrowLeft","ArrowRight","ArrowUp","Space","Enter","Digit1","Digit2","Digit3","Digit4"];
          if (blocks.includes(e.code)) e.preventDefault();

          if (this.state === "quiz") {
            if (e.code === "Digit1") this.answerQuiz(0);
            if (e.code === "Digit2") this.answerQuiz(1);
            if (e.code === "Digit3") this.answerQuiz(2);
            if (e.code === "Digit4") this.answerQuiz(3);
            return;
          }
          if ((this.state === "intro" || this.state === "rules") && (e.code === "Space" || e.code === "Enter")) {
            this.state = this.state === "intro" ? "rules" : "playing"; this.clearInput(); return;
          }
          if ((this.state === "win" || this.state === "gameover") && (e.code === "Space" || e.code === "Enter")) {
            this.resetAll(); return;
          }
          if (this.state !== "playing") return;
          if (e.code === "ArrowLeft") this.input.left = true;
          if (e.code === "ArrowRight") this.input.right = true;
          if (e.code === "Space" || e.code === "ArrowUp") {
            if (!this.input.jump) this.input.jumpPressed = true;
            this.input.jump = true;
          }
        }, { passive: false });

        window.addEventListener("keyup", (e) => {
          if (this.state !== "playing") return;
          if (e.code === "ArrowLeft") this.input.left = false;
          if (e.code === "ArrowRight") this.input.right = false;
          if (e.code === "Space" || e.code === "ArrowUp") this.input.jump = false;
        });
      }

      bindPointerStart() {
        this.canvas.addEventListener("pointerdown", () => {
          if (this.state === "quiz") return;
          if (this.state === "intro") { this.state = "rules"; this.clearInput(); return; }
          if (this.state === "rules") { this.state = "playing"; this.clearInput(); return; }
          if (this.state === "win" || this.state === "gameover") { this.resetAll(); return; }
        }, { passive: true });
      }

      loop() {
        const now = performance.now() / 1000;
        const frameDt = Math.min(0.05, now - this.last);
        this.last = now;
        this.accum += frameDt;
        while (this.accum >= this.fixedDt) { this.step(this.fixedDt); this.accum -= this.fixedDt; }
        this.render();
        requestAnimationFrame(() => this.loop());
      }

      step(dt) {
        for (const c of this.bgClouds) {
          c.x += c.spd * dt;
          if (c.x > this.levelWidth + 200) c.x = -200;
        }

        if (this.state === "quiz") { this.quiz.lock = Math.max(0, this.quiz.lock - dt); this.input.jumpPressed = false; return; }
        if (this.state !== "playing") { this.input.jumpPressed = false; return; }

        this.effects.invertTimer = Math.max(0, this.effects.invertTimer - dt);
        this.timeLeft -= dt;
        if (this.timeLeft <= 0) { this.timeLeft = 0; this.setState("gameover", T.timeUp); this.clearInput(); return; }

        this.player.update(dt, this);

        for (let i = this.bullets.length - 1; i >= 0; i--) {
          const b = this.bullets[i];
          b.update(dt, this);
          if (!b.dead && this.player.invuln <= 0 && this.player.aabb.intersects(b.aabb)) {
            b.dead = true;
            const fromDir = b.vx > 0 ? 1 : -1;
            this.player.hurt(this, fromDir);
          }
          if (b.dead) this.bullets.splice(i, 1);
        }

        for (const it of this.items) {
          it.update(dt);
          if (!it.collected && this.player.aabb.intersects(it.aabb)) {
            it.collected = true;
            this.score += 150;
            this.timeLeft = Math.min(this.timeLimit, this.timeLeft + 2.0);
          }
        }

        for (const st of this.stars) {
          st.update(dt);
          if (!st.used && this.player.aabb.intersects(st.aabb)) {
            st.used = true;
            const idx = st.qIndex % QUIZ_STARS.length;
            this.beginQuiz({
              title: T.quizStarTitle, source: QUIZ_STARS, idx,
              onCorrect: () => { this.score += 200; setTimeout(() => { this.clearInput(); this.state = "playing"; }, 600); },
              onWrong:   () => { this.effects.invertTimer = 10; setTimeout(() => { this.clearInput(); this.state = "playing"; }, 600); }
            });
            return;
          }
        }

        for (const en of this.enemies) {
          en.update(dt, this);
          if (!en.alive) continue;
          if (this.player.aabb.intersects(en.aabb)) {
            const playerBottom = this.player.y + this.player.h;
            const enemyTop = en.y;
            const falling = this.player.vy > 50;
            const stomp = falling && (playerBottom - enemyTop) < 14 && (this.player.y < en.y);
            if (stomp) {
              en.alive = false;
              this.player.vy = -260;
              this.beginQuiz({
                title: T.quizWWITitle, source: QUIZ_WWI, idx: (Math.random() * QUIZ_WWI.length) | 0,
                onCorrect: () => { this.score += 150; setTimeout(() => { this.clearInput(); this.state = "playing"; }, 600); },
                onWrong:   () => {
                  this.lives -= 1;
                  if (this.lives <= 0) setTimeout(() => { this.setState("gameover", "你答錯第一次世界大戰題目，任務失敗。"); }, 600);
                  else setTimeout(() => { this.clearInput(); this.state = "playing"; }, 600);
                }
              });
              return;
            } else {
              const fromDir = (this.player.x + this.player.w * 0.5) < (en.x + en.w * 0.5) ? -1 : 1;
              this.player.hurt(this, fromDir);
            }
          }
        }

        if (this.player.aabb.intersects(this.goalAABB())) {
          this.beginQuiz({
            title: T.quizDoorTitle, source: QUIZ_TELEGRAM, idx: (Math.random() * QUIZ_TELEGRAM.length) | 0,
            onCorrect: () => { this.score += 300; setTimeout(() => { this.clearInput(); this.state = "win"; }, 650); },
            onWrong:   () => {
              this.lives -= 1;
              if (this.lives <= 0) setTimeout(() => { this.setState("gameover", "你答錯史料題，任務失敗。"); }, 650);
              else setTimeout(() => {
                this.clearInput();
                this.state = "playing";
                this.player.x = this.goal.x - 220;
                this.player.y = this.goal.y - 40;
                this.player.vx = 0; this.player.vy = 0;
              }, 650);
            }
          });
          return;
        }

        const target = clamp(this.player.x - this.W * 0.40, 0, this.levelWidth - this.W);
        this.cameraX = lerp(this.cameraX, target, this.cameraSmooth);
        this.score += Math.max(0, this.player.vx) * dt * 0.02;
        this.input.jumpPressed = false;
      }

      render() {
        const ctx = this.ctx, w = this.W, h = this.H;

        ctx.fillStyle = "#0b1020"; ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = "rgba(185,199,230,0.10)"; ctx.fillRect(0, 0, w, h * 0.55);
        ctx.fillStyle = "rgba(185,199,230,0.06)"; ctx.fillRect(0, h * 0.35, w, h * 0.35);

        this.drawBackground(ctx);
        this.drawClouds(ctx);

        for (const p of this.platforms) {
          if (p.x - this.cameraX > w + 240 || p.x + p.w - this.cameraX < -240) continue;
          p.draw(ctx, this.cameraX, this.scale);
        }

        this.drawGoal(ctx);

        for (const it of this.items) {
          if (it.x - this.cameraX > w + 240 || it.x - this.cameraX < -240) continue;
          it.draw(ctx, this.cameraX, this.scale);
        }
        for (const st of this.stars) {
          if (st.x - this.cameraX > w + 240 || st.x - this.cameraX < -240) continue;
          st.draw(ctx, this.cameraX, this.scale);
        }
        for (const en of this.enemies) {
          if (en.x - this.cameraX > w + 240 || en.x - this.cameraX < -240) continue;
          en.draw(ctx, this.cameraX, this.scale);
        }
        for (const b of this.bullets) {
          if (b.x - this.cameraX > w + 260 || b.x - this.cameraX < -260) continue;
          b.draw(ctx, this.cameraX, this.scale);
        }

        this.player.draw(ctx, this.cameraX, this.scale, this.effects.invertTimer > 0);
        this.drawHUD(ctx);

        if (this.state === "intro") this.drawPanel(ctx, T.introTitle, T.introLines, T.pressToContinue);
        if (this.state === "rules") this.drawPanel(ctx, T.rulesTitle, T.rulesLines, T.pressToContinue);
        if (this.state === "win") this.drawPanel(ctx, T.winTitle, T.winLines, "點畫面或按 SPACE/ENTER 重新開始");
        if (this.state === "gameover") this.drawPanel(ctx, T.loseTitle, [this.gameOverReason || "任務失敗。"], "點畫面或按 SPACE/ENTER 重新開始");
        if (this.state === "quiz") this.drawQuiz(ctx);
      }

      drawBackground(ctx) {
        const w = this.W, far = 0.25;
        ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.fillRect(0, 250, w, 160);
        const baseY = 410;
        for (const b of this.bgBuildings) {
          const x = (b.x - this.cameraX * far) | 0;
          if (x > w + 120 || x + b.w < -120) continue;
          const y = baseY - b.h;
          const bodyCol =
            b.tone < 0.33 ? "rgba(44,45,52,0.75)" :
            b.tone < 0.66 ? "rgba(75,86,110,0.65)" :
            "rgba(122,59,46,0.55)";
          ctx.fillStyle = bodyCol; ctx.fillRect(x, y, b.w, b.h);
          ctx.fillStyle = "rgba(139,47,42,0.55)";
          if (b.roof === "flat") ctx.fillRect(x, y - 6, b.w, 6);
          else if (b.roof === "gable") {
            for (let i = 0; i < 8; i++) {
              const rw = b.w - i * 6; if (rw <= 0) break;
              ctx.fillRect(x + i * 3, y - 6 - i * 3, rw, 3);
            }
          } else { for (let i = 0; i < b.w; i += 12) ctx.fillRect(x + i, y - 12, 10, 12); }
          ctx.fillStyle = "rgba(243,199,75,0.18)";
          const rows = Math.max(2, Math.floor(b.h / 40));
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < b.windows; c++) {
              const wx = x + 10 + c * Math.floor((b.w - 20) / b.windows);
              const wy = y + 12 + r * Math.floor((b.h - 20) / rows);
              ctx.fillRect(wx, wy, 6, 8);
            }
          }
          if (b.chimney) {
            ctx.fillStyle = "rgba(27,31,46,0.55)";
            ctx.fillRect(x + b.w - 18, y - 26, 10, 20);
            ctx.fillStyle = "rgba(0,0,0,0.18)";
            ctx.fillRect(x + b.w - 20, y - 30, 14, 6);
          }
        }
      }

      drawClouds(ctx) {
        for (const c of this.bgClouds) {
          const x = (c.x - this.cameraX * 0.18) | 0;
          const y = c.y | 0;
          if (x > this.W + 120 || x < -160) continue;
          drawSprite(ctx, SPRITES.cloud, x, y, c.s);
        }
      }

      drawGoal(ctx) {
        const sx = (this.goal.x - this.cameraX) | 0;
        const sy = this.goal.y | 0;
        drawSprite(ctx, SPRITES.door, sx, sy, this.scale);
        ctx.font = "12px system-ui, sans-serif";
        ctx.fillStyle = "rgba(255,255,255,0.70)";
        ctx.fillText("10", sx + 10, sy - 6);
      }

      drawHUD(ctx) {
        const pad = 14, panelW = 430, panelH = 64;
        ctx.fillStyle = "rgba(10,14,26,0.65)";
        ctx.fillRect(pad, pad, panelW, panelH);
        ctx.strokeStyle = "rgba(255,255,255,0.10)";
        ctx.strokeRect(pad + 0.5, pad + 0.5, panelW - 1, panelH - 1);

        const score = Math.floor(this.score);
        const time = Math.ceil(this.timeLeft);

        ctx.fillStyle = "rgba(232,229,216,0.95)";
        ctx.font = "bold 16px system-ui, sans-serif";
        ctx.fillText(T.title, pad + 12, pad + 22);

        ctx.font = "14px system-ui, sans-serif";
        ctx.fillStyle = "rgba(232,229,216,0.90)";
        ctx.fillText(`${T.hudScore}：${score}`, pad + 12, pad + 44);
        ctx.fillStyle = "rgba(255,90,106,0.95)";
        ctx.fillText(`${T.hudLives}：${this.lives}`, pad + 165, pad + 44);
        ctx.fillStyle = time <= 15 ? "rgba(255,90,106,0.95)" : "rgba(243,199,75,0.95)";
        ctx.fillText(`${T.hudTime}：${time}s`, pad + 285, pad + 44);

        if (this.effects.invertTimer > 0) {
          ctx.fillStyle = "rgba(255,90,106,0.95)";
          ctx.font = "800 14px system-ui, sans-serif";
          ctx.fillText(`⚠ 左右反轉：${Math.ceil(this.effects.invertTimer)}s`, pad + 12, pad + 62);

          const sec = Math.ceil(this.effects.invertTimer);
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.35)";
          ctx.fillRect(0, 0, this.W, this.H);
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillStyle = "#ff5a6a";
          ctx.font = "900 52px system-ui, sans-serif";
          ctx.fillText("⚠ 操作反轉！", this.W / 2, this.H / 2 - 30);
          ctx.fillStyle = "#ffd166";
          ctx.font = "800 30px system-ui, sans-serif";
          ctx.fillText(`剩餘 ${sec} 秒`, this.W / 2, this.H / 2 + 30);
          ctx.restore();
        }
      }

      drawPanel(ctx, title, lines, footer) {
        const w = this.W, h = this.H;
        ctx.fillStyle = "rgba(10,14,26,0.78)"; ctx.fillRect(0, 0, w, h);
        const cw = Math.min(860, w - 60), ch = Math.min(460, h - 60);
        const cx = (w - cw) / 2, cy = (h - ch) / 2;
        ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fillRect(cx, cy, cw, ch);
        ctx.strokeStyle = "rgba(255,255,255,0.14)"; ctx.strokeRect(cx + 0.5, cy + 0.5, cw - 1, ch - 1);
        ctx.fillStyle = "rgba(232,229,216,0.96)";
        ctx.font = "800 26px system-ui, sans-serif"; ctx.fillText(title, cx + 24, cy + 52);
        ctx.font = "15px system-ui, sans-serif"; ctx.fillStyle = "rgba(232,229,216,0.92)";
        let yy = cy + 88; for (const ln of lines) { ctx.fillText(ln, cx + 24, yy); yy += 22; }
        ctx.fillStyle = "rgba(243,199,75,0.95)";
        ctx.font = "800 16px system-ui, sans-serif";
        ctx.fillText(footer, cx + 24, cy + ch - 26);
      }

      drawQuiz(ctx) {
        const w = this.W, h = this.H;
        const item = this.quiz.source[this.quiz.idx];
        ctx.fillStyle = "rgba(10,14,26,0.82)"; ctx.fillRect(0, 0, w, h);
        const cw = Math.min(860, w - 80), ch = Math.min(420, h - 80);
        const cx = (w - cw) / 2, cy = (h - ch) / 2;
        ctx.fillStyle = "rgba(255,255,255,0.06)"; ctx.fillRect(cx, cy, cw, ch);
        ctx.strokeStyle = "rgba(255,255,255,0.14)"; ctx.strokeRect(cx + 0.5, cy + 0.5, cw - 1, ch - 1);

        ctx.fillStyle = "rgba(232,229,216,0.96)";
        ctx.font = "800 22px system-ui, sans-serif"; ctx.fillText(this.quiz.title, cx + 22, cy + 42);

        ctx.font = "16px system-ui, sans-serif"; ctx.fillStyle = "rgba(232,229,216,0.94)";
        ctx.fillText(item.q, cx + 22, cy + 74);

        this.quiz.optionRects = [];
        const btnH = 44, gap = 10; let by = cy + 100;
        for (let i = 0; i < item.options.length; i++) {
          const bx = cx + 22, bw = cw - 44;
          const chosen = this.quiz.selected === i;

          ctx.fillStyle = chosen ? "rgba(243,199,75,0.22)" : "rgba(255,255,255,0.08)";
          ctx.fillRect(bx, by, bw, btnH);
          ctx.strokeStyle = "rgba(255,255,255,0.14)";
          ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, btnH - 1);

          ctx.fillStyle = "rgba(232,229,216,0.95)";
          ctx.font = "16px system-ui, sans-serif";
          ctx.fillText(`${i + 1}) ${item.options[i]}`, bx + 14, by + 28);

          this.quiz.optionRects.push({ x: bx, y: by, w: bw, h: btnH, idx: i });
          by += btnH + gap;
        }

        ctx.fillStyle = "rgba(243,199,75,0.95)";
        ctx.font = "700 14px system-ui, sans-serif";
        ctx.fillText(T.quizHint, cx + 22, cy + ch - 50);

        if (this.quiz.feedback) {
          ctx.fillStyle = "rgba(232,229,216,0.95)";
          ctx.font = "700 14px system-ui, sans-serif";
          ctx.fillText(this.quiz.feedback, cx + 22, cy + ch - 26);
        }
      }
    }

    const canvas = document.getElementById("game");
    if (!canvas) throw new Error('Missing <canvas id="game">');
    new Game(canvas);
  })();
  </script>
</body>
</html>
